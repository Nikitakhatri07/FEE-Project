<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paws & Cups</title>
  <link rel="stylesheet" href="style2.css">
</head>
<body>

<!-- NAVBAR -->
<header>
  <nav class="navbar">
    <div class="logo-area">
      <img src="images/logo.png" class="logo" alt="Paws & Cups Logo">
      <span class="cafe-name">Paws <span class="and-sign">&</span> Cups</span>
    </div>

    <ul class="nav-links">
      <li><a href="index2.html" class="active-link">Home</a></li>
      <li><a href="about2.html">About</a></li>
      <li><a href="menu2.html">Menu</a></li>
      <li><a href="contact2.html">Visit Us</a></li>
    </ul>
    <div class="menu-icon">☰</div>

<div class="cart-box">
  🛒 <span id="cart-count">0</span> | <span id="cart-total">₹0</span>
</div>
  </nav>
</header>

<!-- HOME -->
<section id="home" class="home-section">
  <div class="home-text">
    <p id="status"></p>
    <span class="top-tag">Est. 2026 · Banur's Coziest Café</span>
    <h1>Snuggle, Sip<br><em>&amp; Stay Awhile</em></h1>
    <p>Where every cup tells a story and every wag says welcome.</p>
    <div class="home-buttons">
      <a href="menu2.html" class="pink-btn">Explore Menu</a>
      <a href="about2.html" class="clear-btn">Our Story ↓</a>
    </div>
  </div>
</section>

<!-- FOOTER -->
<footer>
  <div class="footer-middle">
    <span class="cafe-name small">Paws <span class="and-sign">&</span> Cups</span>
    <p>© 2026 Paws & Cups</p>
  </div>
</footer>
<script src="script.js"></script>

<!-- Simple, Beginner-Friendly JavaScript Features -->
<script>
  // --- FEATURE 1: Dynamic Greeting ---
  // This checks the time of day and updates the empty <p id="status"> tag.
  function setGreeting() {
    let hour = new Date().getHours();
    let greetingText = "";

    if (hour < 12) {
      greetingText = "Good Morning! Have a pawsome day! 🐾";
    } else if (hour < 18) {
      greetingText = "Good Afternoon! Time for a coffee break! ☕";
    } else {
      greetingText = "Good Evening! Come relax with your pets! 🌙";
    }

    // Find the HTML element with id="status" and change its text
    document.getElementById("status").innerText = greetingText;
  }
  
  // Run the greeting function
  setGreeting();


  // --- FEATURE 2: Interactive Cart Alert ---
  // Shows a simple pop-up message when someone clicks on the cart.
  let cartBox = document.querySelector(".cart-box");
  
  cartBox.onclick = function() {
    alert("Your cart is empty! Visit our Menu page to add some tasty treats.");
  };


  // --- FEATURE 3: Fun Secret Message ---
  // Changes the text of the small top tag when clicked.
  let topTag = document.querySelector(".top-tag");
  
  topTag.onclick = function() {
    topTag.innerText = "Surprise! You just gave a virtual belly rub to a puppy! 🐶💕";
  };

  // --- FEATURE 4: Mobile Menu Toggle ---
  // Opens and closes the navigation menu when the hamburger icon is clicked
  let menuIcon = document.querySelector(".menu-icon");
  let navMenu = document.querySelector(".nav-links");
  
  menuIcon.onclick = function() {
    navMenu.classList.toggle("active");
  };
</script>
</body>
</html>
